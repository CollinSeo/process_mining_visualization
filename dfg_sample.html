          id: e.id,
          width: e.baseWidth || 2,
          color: {color: e.baseColor || '#1E40AF', highlight: '#1D4ED8', inherit: false}
        });
      });
    }

    function applyReplay(index, animated) {
      resetStyles();
      if (!replayEvents.length) {
        replayInfo.textContent = 'No replay events available';
        hideAllTokens();
        return;
      }

      var idx = Math.max(0, Math.min(index, replayEvents.length - 1));
      var current = replayEvents[idx];

      var lastByCase = {};
      for (var i = 0; i <= idx; i++) {
        var ev = replayEvents[i];
        lastByCase[ev.case_id] = ev;
      }

      var activeCases = Object.keys(lastByCase);
      hideAllTokens();
      activeCases.forEach(function (cid) {
        var ev = lastByCase[cid];
        setTokenAtNode(cid, ev.activity);
      });

      var prev = null;
      for (var j = idx - 1; j >= 0; j--) {
        if (replayEvents[j].case_id === current.case_id) {
          prev = replayEvents[j];
          break;
        }
      }

      if (current && current.edge_id && edges.get(current.edge_id)) {
        var edgeObj = edges.get(current.edge_id);
        edges.update({
          id: current.edge_id,
          width: (edgeObj.baseWidth || edgeObj.width || 2) + 2,
          color: {color: '#DC2626', highlight: '#B91C1C', inherit: false}
        });
      }

      if (animated && prev) {
        animateToken(current.case_id, prev.activity, current.activity, 420);
      } else if (current) {
        setTokenAtNode(current.case_id, current.activity);
      }

      replayInfo.innerHTML =
        "<b>Time:</b> " + current.timestamp + "<br/>"
        + "<b>Current case:</b> " + current.case_id + "<br/>"
        + "<b>Current activity:</b> " + current.activity + "<br/>"
        + "<b>Active tokens:</b> " + activeCases.length + "<br/>"
        + "<b>Step:</b> " + (idx + 1) + " / " + replayEvents.length;
    }

    function applyComplexity() {
      var minEdge = parseInt(minEdgeSlider.value, 10);
      var topN = parseInt(topActSlider.value, 10);

      var keepNodeIds = new Set(activityNodes.slice(0, topN).map(function (n) { return n.id; }));
      if (allNodes.some(function (n) { return n.id === '[START]'; })) keepNodeIds.add('[START]');
      if (allNodes.some(function (n) { return n.id === '[END]'; })) keepNodeIds.add('[END]');

      var filteredEdges = allEdges.filter(function (e) {
        var c = e.count || 1;
        return c >= minEdge && keepNodeIds.has(e.from) && keepNodeIds.has(e.to);
      });

      var connected = new Set();
      filteredEdges.forEach(function (e) {
        connected.add(e.from);
        connected.add(e.to);
      });

      var filteredNodes = allNodes.filter(function (n) {
        return connected.has(n.id) || (startEndSet.has(n.id) && keepNodeIds.has(n.id));
      });

      nodes.clear();
      nodes.add(filteredNodes);
      edges.clear();
      edges.add(filteredEdges);

      minEdgeValue.textContent = String(minEdge);
      topActValue.textContent = String(topN);

      applyReplay(parseInt(replaySlider.value, 10), false);
    }

    function stopReplay() {
      if (replayTimer) {
        clearInterval(replayTimer);
        replayTimer = null;
      }
      replayPlaying = false;
      replayToggle.textContent = 'Play';
    }

    function startReplay() {
      if (!replayEvents.length) {
        return;
      }
      stopReplay();
      replayPlaying = true;
      replayToggle.textContent = 'Pause';
      var speed = parseFloat(replaySpeed.value || '1');
      var intervalMs = Math.max(220, Math.floor(900 / speed));
      replayTimer = setInterval(function () {
        var idx = parseInt(replaySlider.value, 10);
        if (idx >= replayEvents.length - 1) {
          stopReplay();
          return;
        }
        var next = idx + 1;
        replaySlider.value = String(next);
        applyReplay(next, true);
      }, intervalMs);
    }

    minEdgeSlider.addEventListener('input', function () {
      stopReplay();
      applyComplexity();
    });
    topActSlider.addEventListener('input', function () {
      stopReplay();
      applyComplexity();
    });
    replaySlider.addEventListener('input', function () {
      stopReplay();
      applyReplay(parseInt(replaySlider.value, 10), false);
    });
    replayToggle.addEventListener('click', function () {
      if (replayPlaying) {
        stopReplay();
      } else {
        startReplay();
      }
    });
    replaySpeed.addEventListener('change', function () {
      if (replayPlaying) {
        startReplay();
      }
    });

    if (!replayEvents.length) {
      replayInfo.textContent = 'No replay data available';
      replayToggle.disabled = true;
      replaySlider.disabled = true;
    }

    applyComplexity();
    setTimeout(function(){network.moveTo({scale: 1.5});}, 200);
  }

  setTimeout(attachControls, 150);
})();
</script>
</body>
</html>
